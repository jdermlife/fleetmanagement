name: CI-CD Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend smoke tests
        run: |
          python -m unittest discover -s tests -p test_fastapi_auth_smoke.py -v

      - name: Compile critical modules
        run: |
          python -m py_compile \
            main.py \
            app/database.py \
            app/fastapi_auth.py \
            app/routes/workflow.py \
            app/routes/documents.py \
            app/routes/notifications.py \
            app/services/notification_service.py

  frontend-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs:
      - backend-build-test
      - frontend-build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger backend deployment
        env:
          BACKEND_DEPLOY_WEBHOOK_URL: ${{ secrets.BACKEND_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$BACKEND_DEPLOY_WEBHOOK_URL" ]; then
            echo "BACKEND_DEPLOY_WEBHOOK_URL is not configured"
            exit 1
          fi
          curl -fsS -X POST "$BACKEND_DEPLOY_WEBHOOK_URL"

      - name: Trigger frontend deployment
        env:
          FRONTEND_DEPLOY_WEBHOOK_URL: ${{ secrets.FRONTEND_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$FRONTEND_DEPLOY_WEBHOOK_URL" ]; then
            echo "FRONTEND_DEPLOY_WEBHOOK_URL is not configured"
            exit 1
          fi
          curl -fsS -X POST "$FRONTEND_DEPLOY_WEBHOOK_URL"
