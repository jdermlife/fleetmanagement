name: Backend Tests & Validation

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    name: Backend Tests & Syntax Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run FastAPI auth smoke tests
        working-directory: ./backend
        run: |
          python -m unittest discover -s tests -p test_fastapi_auth_smoke.py -v

      - name: Validate core module syntax
        working-directory: ./backend
        run: |
          python -m py_compile \
            main.py \
            app/__init__.py \
            app/database.py \
            app/fastapi_auth.py \
            app/fastapi_rate_limit.py \
            app/routes/drivers.py \
            app/routes/lease.py \
            app/routes/database.py \
            app/routes/loan_routes.py \
            app/routes/ai.py

      - name: Run existing backend tests
        working-directory: ./backend
        run: |
          python -m unittest discover -s tests -p test_app.py -v 2>&1 | head -50
        continue-on-error: true
